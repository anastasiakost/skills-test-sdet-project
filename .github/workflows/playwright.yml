name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BASE_URL: https://thinking-tester-contact-list.herokuapp.com
  ENV: ci
  LOG_LEVEL: info

jobs:
  api:
    name: API tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run API tests
        run: npx playwright test --project=api
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-api
          path: blob-report/
          retention-days: 7
      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-output-api
          path: |
            test-results/
            logs/
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E tests
    timeout-minutes: 60
    needs: api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test --project=e2e
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-e2e
          path: blob-report/
          retention-days: 7
      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-output-e2e
          path: |
            test-results/
            logs/
          retention-days: 14
          if-no-files-found: ignore

  merge-report:
    name: Merge reports
    if: always()
    needs: [api, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true
      - name: Merge into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload combined HTML report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
